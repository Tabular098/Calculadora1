<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora JS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2e2e2e;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --text: #f0f0f0;
    --muted: #888;
    --red: #f04a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.03em;
  }
  h1 span { color: var(--accent); }
  .age-btn {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
    letter-spacing: 0.05em;
  }
  .age-btn:hover { background: var(--accent); color: #000; }

  .calc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(200,240,74,0.06), 0 0 0 1px var(--border);
  }

  /* Display */
  .display {
    background: var(--surface2);
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .display-expr {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
    text-align: right;
    margin-bottom: 6px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .display-main {
    font-family: 'Space Mono', monospace;
    font-size: 2.6rem;
    font-weight: 700;
    text-align: right;
    color: var(--text);
    line-height: 1;
    min-height: 3rem;
    word-break: break-all;
    transition: color 0.15s;
  }
  .display-main.error { color: var(--red); font-size: 1.4rem; }

  /* Op labels */
  .op-label {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 10px 1.5rem 0;
  }
  .op-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: border-color 0.15s, color 0.15s;
  }
  .op-tag.active { border-color: var(--accent); color: var(--accent); }

  /* Buttons */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    padding: 1px;
  }
  .btn {
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: 18px 10px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.95); }

  .btn-accent { background: var(--surface); color: var(--accent); font-size: 1.1rem; }
  .btn-accent:hover { background: rgba(200,240,74,0.1); }
  .btn-op { color: var(--accent2); }
  .btn-eq {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 1.3rem;
    grid-column: span 2;
  }
  .btn-eq:hover { background: #d4f562; }
  .btn-clear { color: var(--red); }
  .btn-span2 { grid-column: span 2; }

  /* Special ops section */
  .special-section {
    padding: 1rem 1.5rem 1.5rem;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .special-section h3 {
    grid-column: span 2;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .btn-special {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    text-align: center;
  }
  .btn-special span { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; }
  .btn-special:hover { background: var(--surface); border-color: var(--accent2); color: var(--accent2); }
  .btn-special:active { transform: scale(0.97); }

  footer {
    margin-top: 1.5rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Calcu<span>.</span>js</h1>
    <a href="edad.html" class="age-btn">→ Calcular edad</a>
  </header>

  <div class="calc-card">
    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="display">0</div>
    </div>
    <div class="op-label">
      <span class="op-tag" id="tag-sum">+</span>
      <span class="op-tag" id="tag-sub">−</span>
      <span class="op-tag" id="tag-mul">×</span>
      <span class="op-tag" id="tag-div">÷</span>
    </div>

    <div class="buttons">
      <button class="btn btn-clear" onclick="clearAll()">AC</button>
      <button class="btn btn-accent" onclick="toggleSign()">+/−</button>
      <button class="btn btn-accent" onclick="percent()">%</button>
      <button class="btn btn-op" onclick="setOp('/')">÷</button>

      <button class="btn" onclick="digit('7')">7</button>
      <button class="btn" onclick="digit('8')">8</button>
      <button class="btn" onclick="digit('9')">9</button>
      <button class="btn btn-op" onclick="setOp('*')">×</button>

      <button class="btn" onclick="digit('4')">4</button>
      <button class="btn" onclick="digit('5')">5</button>
      <button class="btn" onclick="digit('6')">6</button>
      <button class="btn btn-op" onclick="setOp('-')">−</button>

      <button class="btn" onclick="digit('1')">1</button>
      <button class="btn" onclick="digit('2')">2</button>
      <button class="btn" onclick="digit('3')">3</button>
      <button class="btn btn-op" onclick="setOp('+')">+</button>

      <button class="btn btn-span2" onclick="digit('0')">0</button>
      <button class="btn" onclick="decimal()">.</button>
      <button class="btn btn-eq" onclick="calculate()">=</button>
    </div>

    <div class="special-section">
      <h3>Operaciones especiales</h3>
      <button class="btn-special" onclick="power()">
        xⁿ
        <span>potencia</span>
      </button>
      <button class="btn-special" onclick="factorial()">
        n!
        <span>factorial</span>
      </button>
    </div>
  </div>

  <footer>JavaScript · DOM · Scripting — Tema 3.1</footer>
</div>

<script>
let current = '0';
let prev = '';
let op = null;
let justCalc = false;
let pendingExp = '';

function updateDisplay(val, err) {
  const d = document.getElementById('display');
  d.textContent = val;
  d.className = 'display-main' + (err ? ' error' : '');
}
function updateExpr(val) {
  document.getElementById('expr').textContent = val;
}
function updateTags(o) {
  ['sum','sub','mul','div'].forEach(t => document.getElementById('tag-'+t).classList.remove('active'));
  const map = {'+':'sum','-':'sub','*':'mul','/':'div'};
  if(o && map[o]) document.getElementById('tag-'+map[o]).classList.add('active');
}

function digit(d) {
  if(justCalc) { current = d; justCalc = false; }
  else current = (current === '0' && d !== '.') ? d : current + d;
  if(current.length > 14) return;
  updateDisplay(current);
}
function decimal() {
  if(justCalc) { current = '0.'; justCalc = false; updateDisplay(current); return; }
  if(!current.includes('.')) { current += '.'; updateDisplay(current); }
}
function clearAll() {
  current = '0'; prev = ''; op = null; justCalc = false; pendingExp = '';
  updateDisplay('0'); updateExpr(''); updateTags(null);
}
function toggleSign() {
  current = String(-parseFloat(current));
  updateDisplay(current);
}
function percent() {
  current = String(parseFloat(current) / 100);
  updateDisplay(current);
}
function setOp(o) {
  if(op && !justCalc) calculate();
  prev = current;
  op = o;
  justCalc = true;
  const sym = {'+':'+','-':'−','*':'×','/':'÷'};
  pendingExp = `${prev} ${sym[o]}`;
  updateExpr(pendingExp);
  updateTags(o);
}
function calculate() {
  if(!op || prev === '') return;
  const a = parseFloat(prev), b = parseFloat(current);
  const sym = {'+':'+','-':'−','*':'×','/':'÷'};
  let result;
  if(op === '/' && b === 0) { updateDisplay('Error: ÷ 0', true); updateExpr(''); op=null; return; }
  if(op === '+') result = a + b;
  else if(op === '-') result = a - b;
  else if(op === '*') result = a * b;
  else if(op === '/') result = a / b;
  const exprStr = `${prev} ${sym[op]} ${current} =`;
  updateExpr(exprStr);
  current = String(+result.toFixed(10));
  updateDisplay(current);
  op = null; prev = ''; justCalc = true;
  updateTags(null);
}

function power() {
  const base = parseFloat(current);
  const exp = parseFloat(prompt(`Potencia: ${base} elevado a la (n):\nIngresa el exponente:`));
  if(isNaN(exp)) { updateDisplay('Error', true); return; }
  const result = Math.pow(base, exp);
  updateExpr(`${base} ^ ${exp} =`);
  current = String(+result.toFixed(10));
  updateDisplay(current);
  justCalc = true;
}
function factorial() {
  const n = parseInt(current);
  if(n < 0 || !Number.isInteger(n) || n > 20) {
    updateDisplay('Error: n debe ser entero 0–20', true); return;
  }
  let r = 1;
  for(let i = 2; i <= n; i++) r *= i;
  updateExpr(`${n}! =`);
  current = String(r);
  updateDisplay(current);
  justCalc = true;
}
</script>
</body>
</html>
