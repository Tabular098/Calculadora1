<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Edad</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2e2e2e;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --text: #f0f0f0;
    --muted: #888;
    --red: #f04a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(74,240,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,240,200,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.03em;
  }
  h1 span { color: var(--accent2); }
  .back-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.05em;
  }
  .back-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(74,240,200,0.05);
  }

  .card-header {
    background: var(--surface2);
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .card-header p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .card-header strong { color: var(--accent2); font-weight: 400; }

  .card-body { padding: 1.5rem; }

  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  input[type="date"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  input[type="date"]:focus { border-color: var(--accent2); }

  .calc-btn {
    width: 100%;
    margin-top: 1.2rem;
    background: var(--accent2);
    color: #000;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 16px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.08s;
  }
  .calc-btn:hover { background: #6cf7d9; }
  .calc-btn:active { transform: scale(0.98); }

  .error-msg {
    display: none;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--red);
    text-align: center;
  }

  /* Result */
  .result-box {
    display: none;
    margin-top: 1.5rem;
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
  }
  .result-box h3 {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .result-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }
  .result-item .num {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent2);
    line-height: 1;
    display: block;
  }
  .result-item .lbl {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 4px;
  }

  .result-phrase {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
  }
  .result-phrase strong { color: var(--accent2); }

  .extra-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .extra-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .extra-item .e-val {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .extra-item .e-lbl {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  footer {
    margin-top: 1.5rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Edad<span>.</span>js</h1>
    <a href="index.html" class="back-btn">← Calculadora</a>
  </header>

  <div class="card">
    <div class="card-header">
      <p>Ingresa tu <strong>fecha de nacimiento</strong> para calcular tu edad exacta en años, meses y días.</p>
    </div>
    <div class="card-body">
      <label for="fechaNac">Fecha de nacimiento</label>
      <input type="date" id="fechaNac" max="">
      <div class="error-msg" id="errorMsg">⚠ Por favor ingresa una fecha válida.</div>
      <button class="calc-btn" onclick="calcularEdad()">CALCULAR EDAD</button>

      <div class="result-box" id="resultBox">
        <h3>Resultado</h3>
        <div class="result-grid">
          <div class="result-item">
            <span class="num" id="resAnios">0</span>
            <span class="lbl">años</span>
          </div>
          <div class="result-item">
            <span class="num" id="resMeses">0</span>
            <span class="lbl">meses</span>
          </div>
          <div class="result-item">
            <span class="num" id="resDias">0</span>
            <span class="lbl">días</span>
          </div>
        </div>
        <div class="result-phrase" id="resultPhrase"></div>
        <div class="extra-info">
          <div class="extra-item">
            <span class="e-val" id="diasVividos">0</span>
            <span class="e-lbl">días vividos</span>
          </div>
          <div class="extra-item">
            <span class="e-val" id="proximoCump">—</span>
            <span class="e-lbl">días para tu cumpleaños</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>JavaScript · DOM · Scripting — Tema 3.1</footer>
</div>

<script>
// Set max date to today
document.getElementById('fechaNac').max = new Date().toISOString().split('T')[0];

function calcularEdad() {
  const input = document.getElementById('fechaNac').value;
  const errEl = document.getElementById('errorMsg');
  const resBox = document.getElementById('resultBox');

  if (!input) {
    errEl.style.display = 'block';
    resBox.style.display = 'none';
    return;
  }
  errEl.style.display = 'none';

  const nac = new Date(input + 'T00:00:00');
  const hoy = new Date();

  if (nac > hoy) {
    errEl.textContent = '⚠ La fecha no puede ser futura.';
    errEl.style.display = 'block';
    resBox.style.display = 'none';
    return;
  }

  let anios = hoy.getFullYear() - nac.getFullYear();
  let meses = hoy.getMonth() - nac.getMonth();
  let dias  = hoy.getDate()  - nac.getDate();

  if (dias < 0) {
    meses--;
    const ultimoDia = new Date(hoy.getFullYear(), hoy.getMonth(), 0).getDate();
    dias += ultimoDia;
  }
  if (meses < 0) { anios--; meses += 12; }

  // Días vividos
  const msVividos = hoy - nac;
  const diasVividos = Math.floor(msVividos / (1000 * 60 * 60 * 24));

  // Próximo cumpleaños
  let cump = new Date(hoy.getFullYear(), nac.getMonth(), nac.getDate());
  if (cump < hoy) cump.setFullYear(hoy.getFullYear() + 1);
  const diasCump = Math.ceil((cump - hoy) / (1000 * 60 * 60 * 24));

  document.getElementById('resAnios').textContent = anios;
  document.getElementById('resMeses').textContent = meses;
  document.getElementById('resDias').textContent = dias;
  document.getElementById('diasVividos').textContent = diasVividos.toLocaleString('es');
  document.getElementById('proximoCump').textContent = diasCump === 0 ? '🎉 ¡Hoy!' : diasCump;

  const edadTexto = `Tienes <strong>${anios} año${anios !== 1 ? 's' : ''}</strong>, ${meses} mes${meses !== 1 ? 'es' : ''} y ${dias} día${dias !== 1 ? 's' : ''}.`;
  document.getElementById('resultPhrase').innerHTML = edadTexto;

  resBox.style.display = 'block';
}

// Allow Enter key
document.getElementById('fechaNac').addEventListener('keydown', e => {
  if(e.key === 'Enter') calcularEdad();
});
</script>
</body>
</html>
